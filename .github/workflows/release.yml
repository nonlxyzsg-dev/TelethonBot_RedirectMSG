name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  semantic-release:
    name: Версионирование и тег
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: python-semantic-release
        id: release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          changelog: "true"
          push: "true"
          commit: "true"
          tag: "true"

  build-windows:
    name: Сборка Windows EXE
    needs: semantic-release
    if: needs.semantic-release.outputs.released == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.tag }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        shell: bash
        env:
          PYI_EXE_NAME: TelethonBot-${{ needs.semantic-release.outputs.tag }}
        run: pyinstaller bot.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelethonBot-${{ needs.semantic-release.outputs.tag }}
          path: dist/TelethonBot-${{ needs.semantic-release.outputs.tag }}.exe
          if-no-files-found: error

  publish:
    name: Публикация релиза
    needs: [semantic-release, build-windows]
    if: needs.semantic-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.tag }}

      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: TelethonBot-${{ needs.semantic-release.outputs.tag }}
          path: ./artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.semantic-release.outputs.tag }}
          name: ${{ needs.semantic-release.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/TelethonBot-${{ needs.semantic-release.outputs.tag }}.exe
            .env.example
            proxies.txt
            README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
